<button id="add-to-cart-482" style="background-color: #1a1a1a; color: #ffffff; padding: 12px 24px; border: none; font-weight: bold; border-radius: 4px; cursor: pointer;">
    Dodaj do koszyka – Odkurzacz ULTRA STEAM
</button>

<script>
document.getElementById('add-to-cart-482').addEventListener('click', function(e) {
    e.preventDefault();
    const button = this;
    const originalText = button.innerText;
    button.innerText = 'Dodawanie...';
    button.disabled = true;

    // Wysyłamy żądanie dokładnie tak, jak robi to Twój nowy koszyk
    fetch('https://cobbo.pl/cart', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({
            productId: 482, // ID z Twojego JSON-a
            quantity: 1
        })
    })
    .then(response => {
        if (response.ok) {
            button.innerText = 'Dodano!';
            // Opcjonalnie: odkomentuj linię poniżej, jeśli po dodaniu chcesz przenieść użytkownika do koszyka
            // window.location.href = 'https://cobbo.pl/cart';
        } else {
            button.innerText = 'Błąd dodawania';
        }
        setTimeout(() => {
            button.innerText = originalText;
            button.disabled = false;
        }, 2000);
    })
    .catch(error => {
        console.error('Error:', error);
        button.innerText = 'Błąd połączenia';
        button.disabled = false;
    });
});
</script>
